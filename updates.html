<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
<section class="max-w-6xl mx-auto p-4">
  <h2 class="text-3xl font-bold mb-6 text-green-700">Farm News & Updates</h2>

  <!-- Search bar -->
  <input
    id="newsSearch"
    type="text"
    placeholder="Search news by keyword or place..."
    class="w-full p-3 mb-6 border rounded focus:outline-none focus:ring-2 focus:ring-green-400"
  />

  <!-- News grid container -->
  <div id="newsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</section>
<script src="/js/updates.js"></script>
</body>
</html>
